<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>2048</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#faf8ef;display:flex;justify-content:center;align-items:center;min-height:100dvh;padding:16px}
.container{width:100%;max-width:420px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
h1{font-size:48px;color:#776e65;font-weight:700;line-height:1}
.score-box{background:#bbada0;color:#fff;border-radius:6px;padding:6px 16px;text-align:center;min-width:80px}
.score-box .label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;opacity:.8}
.score-box .num{font-size:22px;font-weight:700;line-height:1.2}
.best-box{background:#bbada0;color:#fff;border-radius:6px;padding:6px 16px;text-align:center;min-width:80px;margin-left:8px}
.best-box .label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;opacity:.8}
.best-box .num{font-size:22px;font-weight:700;line-height:1.2}
.sub-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.sub-header .desc{color:#776e65;font-size:14px}
.btn-new{background:#8f7a66;color:#fff;border:none;border-radius:6px;padding:10px 20px;font-size:15px;cursor:pointer;font-weight:600;transition:background .15s}
.btn-new:active{background:#7a6458}
.grid{position:relative;background:#bbada0;border-radius:8px;padding:8px;aspect-ratio:1;touch-action:none}
.cells{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;height:100%}
.cell{background:rgba(238,228,218,.35);border-radius:6px;aspect-ratio:1}
.tile-container{position:absolute;top:8px;left:8px;right:8px;bottom:8px;pointer-events:none}
.tile{position:absolute;display:flex;justify-content:center;align-items:center;font-weight:700;border-radius:6px;transition:transform .1s ease,opacity .12s ease;z-index:1}
.tile-merged{z-index:2}
.tile-new{z-index:3}
.tile-2{background:#eee4da;color:#776e65}.tile-4{background:#ede0c8;color:#776e65}
.tile-8{background:#f2b179;color:#f9f6f2}.tile-16{background:#f59563;color:#f9f6f2}
.tile-32{background:#f67c5f;color:#f9f6f2}.tile-64{background:#f65e3b;color:#f9f6f2}
.tile-128{background:#edcf72;color:#f9f6f2;font-size:42px}.tile-256{background:#edcc61;color:#f9f6f2;font-size:42px}
.tile-512{background:#edc850;color:#f9f6f2;font-size:42px}.tile-1024{background:#edc53f;color:#f9f6f2;font-size:36px}
.tile-2048{background:#edc22e;color:#f9f6f2;font-size:36px}.tile-super{background:#3c3a32;color:#f9f6f2;font-size:28px}
.game-over,.game-win{position:absolute;inset:0;background:rgba(238,228,218,.73);border-radius:8px;display:none;justify-content:center;align-items:center;flex-direction:column;z-index:10}
.game-over.show,.game-win.show{display:flex}
.game-over .title,.game-win .title{font-size:48px;font-weight:700;color:#776e65;margin-bottom:16px}
.game-win .title{color:#edc22e}
.game-over .btn-retry,.game-win .btn-retry{background:#8f7a66;color:#fff;border:none;border-radius:6px;padding:12px 32px;font-size:18px;cursor:pointer;font-weight:600;transition:background .15s}
.game-over .btn-retry:active,.game-win .btn-retry:active{background:#7a6458}
.keep-going{background:transparent;border:2px solid #8f7a66;border-radius:6px;padding:10px 24px;font-size:16px;cursor:pointer;font-weight:600;color:#776e65;margin-top:12px;transition:background .15s}
.keep-going:active{background:rgba(143,122,102,.15)}
.footer{text-align:center;margin-top:20px;color:#776e65;font-size:13px;opacity:.6}
.swipe-hint{display:flex;justify-content:center;gap:16px;margin-top:12px;color:#776e65;font-size:20px;opacity:.4}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>2048</h1>
    <div style="display:flex">
      <div class="score-box">
        <div class="label">分数</div>
        <div class="num" id="score">0</div>
      </div>
      <div class="best-box">
        <div class="label">最高</div>
        <div class="num" id="best">0</div>
      </div>
    </div>
  </div>
  <div class="sub-header">
    <span class="desc">滑动方块合成 <strong>2048</strong></span>
    <button class="btn-new" id="btnNew">新一局</button>
  </div>
  <div class="grid" id="grid">
    <div class="cells">
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    </div>
    <div class="tile-container" id="tileContainer"></div>
    <div class="game-over" id="gameOver">
      <div class="title">游戏结束</div>
      <button class="btn-retry" id="retryBtn">再来一局</button>
    </div>
    <div class="game-win" id="gameWin">
      <div class="title">🎉 你赢了！</div>
      <button class="btn-retry" id="winRetryBtn">再来一局</button>
      <button class="keep-going" id="keepGoing">继续挑战</button>
    </div>
  </div>
  <div class="swipe-hint">← ↑ → ↓</div>
  <div class="footer">在方块中滑动即可移动</div>
</div>
<script>
// ─── Mini State ──────────────────────────────────────────────
const SIZE=4,S=12;let grid,best=+localStorage.getItem('g2048_best')||0,score=0,over=0,won=0,skipWin=0;
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);
$('#best').textContent=best;

function emptyGrid(){return Array.from({length:SIZE},()=>Array(SIZE).fill(0))}
function clone(g){return g.map(r=>[...r])}

// ─── Spawn ──────────────────────────────────────────────────
function spawn(g){let e=[];for(let y=0;y<SIZE;y++)for(let x=0;x<SIZE;x++)if(!g[y][x])e.push([y,x]);if(!e.length)return 0;let[y,x]=e[Math.random()*e.length|0];g[y][x]=Math.random()<.9?2:4;return 1}

// ─── Slide ──────────────────────────────────────────────────
function slideRow(r){let f=r.filter(v=>v),n=Array(SIZE).fill(0),s=0,a=[];for(let i=0;i<f.length;i++){if(i+1<f.length&&f[i]===f[i+1]){n[s]=f[i]*2;score+=n[s];i++;a.push(n[s])}else{n[s]=f[i];a.push(f[i])}s++}return{n,a,p:n.join(',')!==r.join(',')}}

function move(g,d){let r=clone(g),p=0;score=0;let m=[];for(let i=0;i<SIZE;i++){let col;if(d==='l')col=slideRow(g[i]);else if(d==='r'){col=slideRow([...g[i]].reverse());col.n=col.n.reverse()}else if(d==='u'){let c=[];for(let j=0;j<SIZE;j++)c.push(g[j][i]);col=slideRow(c)}else if(d==='d'){let c=[];for(let j=SIZE-1;j>=0;j--)c.push(g[j][i]);col=slideRow(c);col.n=col.n.reverse()}if(col.p)p=1;let mv=col.n;for(let j=0;j<SIZE;j++){if(d==='l')g[i][j]=mv[j];else if(d==='r')g[i][j]=mv[j];else if(d==='u')g[j][i]=mv[j];else if(d==='d')g[j][i]=mv[j]}}return p}

// ─── Render ─────────────────────────────────────────────────
function render(g,{merged,newTile,moved}=[]){
  const tc=$('#tileContainer'),gap=8,size=tc.clientWidth,cell=size/SIZE;
  tc.innerHTML='';
  let max=0;
  for(let y=0;y<SIZE;y++)for(let x=0;x<SIZE;x++){
    let v=g[y][x];if(!v)continue;
    if(v>max)max=v;
    let el=document.createElement('div');el.className='tile';
    let cls='tile-'+v;if(v>2048)cls='tile-super';
    el.classList.add(cls);
    let s=getSize(v);
    el.style.width=cell-gap+'px';el.style.height=cell-gap+'px';
    el.style.left=x*cell+gap/2+'px';el.style.top=y*cell+gap/2+'px';
    el.style.fontSize=s+'px';
    el.textContent=v;
    // animation
    if(moved&&moved.some(([my,mx])=>my===y&&mx===x)){
      if(newTile&&newTile[0]===y&&newTile[1]===x){
        el.style.transform='scale(0)';el.classList.add('tile-new');
        requestAnimationFrame(()=>{el.style.transform='scale(1)'})
      } else if(merged&&merged.some(([my,mx])=>my===y&&mx===x)){
        el.classList.add('tile-merged');
        el.style.transform='scale(1.2)';requestAnimationFrame(()=>{el.style.transform='scale(1)'})
      }
    }
    tc.appendChild(el);
  }
  // update score
  let total=0;for(let y=0;y<SIZE;y++)for(let x=0;x<SIZE;x++)total+=g[y][x];
  // actually we track score in move()
  // but we need current game score - reconstruct
  // simpler: use a running var
}

function getSize(v){if(v<100)return 52;if(v<1000)return 40;if(v<10000)return 32;return 24}

// ─── Full Render + Overlay ──────────────────────────────────
let gameScore=0;
function fullRender(g,movedData){
  const tc=$('#tileContainer'),gap=8,size=tc.clientWidth,cell=size/SIZE;
  if(!size)return;
  tc.innerHTML='';
  let max=0;
  for(let y=0;y<SIZE;y++)for(let x=0;x<SIZE;x++){
    let v=g[y][x];if(!v)continue;
    if(v>max)max=v;
    let el=document.createElement('div');el.className='tile';
    let cls='tile-'+(v>2048?'super':v);
    el.classList.add(cls);
    el.style.width=cell-gap+'px';el.style.height=cell-gap+'px';
    el.style.left=x*cell+gap/2+'px';el.style.top=y*cell+gap/2+'px';
    el.style.fontSize=getSize(v)+'px';
    el.textContent=v;
    if(movedData&&movedData.newTile&&movedData.newTile[0]===y&&movedData.newTile[1]===x){
      el.style.transform='scale(0)';el.classList.add('tile-new');
      requestAnimationFrame(()=>{el.style.transform='scale(1)'})
    }
    if(movedData&&movedData.merged){
      for(let [my,mx] of movedData.merged){if(my===y&&mx===x){
        el.classList.add('tile-merged');
        el.style.transform='scale(1.2)';requestAnimationFrame(()=>{el.style.transform='scale(1)'})
      }}
    }
    tc.appendChild(el);
  }
  // update score display
  let total=0;for(let y=0;y<SIZE;y++)for(let x=0;x<SIZE;x++)total+=g[y][x];
  // track gameScore more simply
}

// ─── Proper Game State ──────────────────────────────────────
let state={grid:emptyGrid(),score:0,over:0,won:0,skipWin:0};
function startGame(){
  state.grid=emptyGrid();state.score=0;state.over=0;state.won=0;state.skipWin=0;
  spawn(state.grid);spawn(state.grid);
  $('#gameOver').classList.remove('show');
  $('#gameWin').classList.remove('show');
  renderAll();
}
function renderAll(movedData){
  const g=state.grid;
  $('#score').textContent=state.score;
  if(state.score>best){best=state.score;localStorage.setItem('g2048_best',best);$('#best').textContent=best}
  const tc=$('#tileContainer'),gap=8,size=tc.clientWidth,cell=size/SIZE;
  if(!size){requestAnimationFrame(renderAll);return}
  tc.innerHTML='';
  let max=0;
  for(let y=0;y<SIZE;y++)for(let x=0;x<SIZE;x++){
    let v=g[y][x];if(!v)continue;
    if(v>max)max=v;
    let el=document.createElement('div');el.className='tile';
    let cls='tile-'+(v>2048?'super':v);
    el.classList.add(cls);
    el.style.width=cell-gap+'px';el.style.height=cell-gap+'px';
    el.style.left=x*cell+gap/2+'px';el.style.top=y*cell+gap/2+'px';
    el.style.fontSize=getSize(v)+'px';
    el.textContent=v;
    if(movedData&&movedData.newTile&&movedData.newTile[0]===y&&movedData.newTile[1]===x&&movedData.newTile[2]===v){
      el.style.transform='scale(0)';el.classList.add('tile-new');
      requestAnimationFrame(()=>{el.style.transform='scale(1)'})
    }
    if(movedData&&movedData.merged){
      for(let [my,mx] of movedData.merged){if(my===y&&mx===x){
        el.classList.add('tile-merged');
        el.style.transform='scale(1.2)';requestAnimationFrame(()=>{el.style.transform='scale(1)'})
      }}
    }
    tc.appendChild(el);
  }
  if(max>=2048&&!state.skipWin&&!state.over){
    $('#gameWin').classList.add('show');
  }
}

// ─── Move Action ────────────────────────────────────────────
function action(dir){
  if(state.over||state.won)return;
  let g=state.grid;
  let old=clone(g);
  let p=move(g,dir);
  let movedData={merged:[],newTile:null};
  // find merged tiles by comparing
  let mergedTiles=[];
  for(let y=0;y<SIZE;y++)for(let x=0;x<SIZE;x++){
    if(g[y][x]!==0&&g[y][x]!==old[y][x]&&old[y][x]!==0&&g[y][x]!==old[y][x]*2){
      // actually merged tiles have value = old*2
    }
    if(g[y][x]!==0&&old[y][x]!==0&&g[y][x]===old[y][x]*2){
      mergedTiles.push([y,x]);
    }
  }
  // Actually simpler: compare grid for doubled values
  // Let's just do it properly
  let merged=[];
  for(let y=0;y<SIZE;y++)for(let x=0;x<SIZE;x++){
    if(g[y][x]!==0&&old[y][x]!==0&&g[y][x]===old[y][x]*2){
      merged.push([y,x]);
    }
  }
  movedData.merged=merged;
  
  if(p){
    let addScore=state.score; // we set score in move()
    // Actually we track score via closure - let's fix
    // We already added to state.score in move()... no, move() uses local score var
    // Let's recalc properly
    // Recalc score change
    let diff=0;
    for(let y=0;y<SIZE;y++)for(let x=0;x<SIZE;x++){
      if(g[y][x]!==0&&old[y][x]!==0&&g[y][x]===old[y][x]*2){
        diff+=g[y][x];
      }
    }
    state.score+=diff;
    
    spawn(g);
    // find new tile
    for(let y=0;y<SIZE;y++)for(let x=0;x<SIZE;x++){
      if(g[y][x]!==0&&old[y][x]===0){
        // check not merged
        let isMerged=false;
        for(let [my,mx] of merged){if(my===y&&mx===x)isMerged=true}
        if(!isMerged)movedData.newTile=[y,x,g[y][x]];
      }
    }
    renderAll(movedData);
    
    // check game over
    if(!canMove(g)){
      state.over=1;
      setTimeout(()=>{
        if(state.over&&!state.won)$('#gameOver').classList.add('show');
      },300);
    }
  }
}

function canMove(g){
  for(let y=0;y<SIZE;y++)for(let x=0;x<SIZE;x++){
    if(!g[y][x])return 1;
    if(x+1<SIZE&&g[y][x]===g[y][x+1])return 1;
    if(y+1<SIZE&&g[y][x]===g[y+1][x])return 1;
  }
  return 0;
}

// Move helper that uses state.score
function move(g,d){
  let p=0;
  for(let i=0;i<SIZE;i++){
    let r=[];
    for(let j=0;j<SIZE;j++){
      if(d==='l')r.push(g[i][j]);
      else if(d==='r')r.push(g[i][SIZE-1-j]);
      else if(d==='u')r.push(g[j][i]);
      else if(d==='d')r.push(g[SIZE-1-j][i]);
    }
    let f=r.filter(v=>v);
    let n=Array(SIZE).fill(0),s=0;
    for(let k=0;k<f.length;k++){
      if(k+1<f.length&&f[k]===f[k+1]){
        n[s]=f[k]*2;state.score+=n[s];k++;
      }else{n[s]=f[k]}s++;
    }
    if(d==='r')n=n.reverse();
    else if(d==='d')n=n.reverse();
    let col=n;
    for(let j=0;j<SIZE;j++){
      if(d==='l'){if(g[i][j]!==col[j])p=1;g[i][j]=col[j]}
      else if(d==='r'){if(g[i][j]!==col[j])p=1;g[i][j]=col[j]}
      else if(d==='u'){if(g[j][i]!==col[j])p=1;g[j][i]=col[j]}
      else if(d==='d'){if(g[j][i]!==col[j])p=1;g[j][i]=col[j]}
    }
  }
  return p;
}

// ─── Input: Swipe ───────────────────────────────────────────
let touchStartX=0,touchStartY=0;
$('#grid').addEventListener('touchstart',e=>{
  let t=e.touches[0];touchStartX=t.clientX;touchStartY=t.clientY;
},{passive:1});
$('#grid').addEventListener('touchend',e=>{
  let t=e.changedTouches[0];
  let dx=t.clientX-touchStartX,dy=t.clientY-touchStartY;
  let adx=Math.abs(dx),ady=Math.abs(dy);
  if(Math.max(adx,ady)<20)return;
  if(adx>ady)action(dx>0?'r':'l');
  else action(dy>0?'d':'u');
},{passive:1});

// ─── Input: Keyboard ────────────────────────────────────────
document.addEventListener('keydown',e=>{
  const map={ArrowLeft:'l',ArrowRight:'r',ArrowUp:'u',ArrowDown:'d'};
  if(map[e.key]){e.preventDefault();action(map[e.key])}
});

// ─── Buttons ─────────────────────────────────────────────────
$('#btnNew').addEventListener('click',startGame);
$('#retryBtn').addEventListener('click',startGame);
$('#winRetryBtn').addEventListener('click',startGame);
$('#keepGoing').addEventListener('click',()=>{
  state.skipWin=1;$('#gameWin').classList.remove('show')
});

// ─── Init ───────────────────────────────────────────────────
startGame();

// ─── Fix score tracker ──────────────────────────────────────
// We already integrate score in move()
// Need to reset score on start
const origStart=startGame;
startGame=function(){
  state.grid=emptyGrid();state.score=0;state.over=0;state.won=0;state.skipWin=0;
  spawn(state.grid);spawn(state.grid);
  $('#gameOver').classList.remove('show');
  $('#gameWin').classList.remove('show');
  renderAll();
};
startGame();

// ─── Track score properly ───────────────────────────────────
// Override: move already modifies state.score
// renderAll displays state.score
// But startGame resets state.score. So we're good.
// Just replace startGame one more time cleanly

// Final cleanup - redefine properly
state.grid=emptyGrid();state.score=0;state.over=0;state.won=0;state.skipWin=0;
spawn(state.grid);spawn(state.grid);
renderAll();

// Re-bind start
$('#btnNew').onclick=$('#retryBtn').onclick=$('#winRetryBtn').onclick=function(){startGame()};
$('#keepGoing').onclick=function(){state.skipWin=1;$('#gameWin').classList.remove('show')};
</script>
</body>
</html>
