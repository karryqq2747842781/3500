<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💕 韩舒雨想你了</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background: #0d0d1a;
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  overflow: hidden;
}
canvas{display:block;width:600px;height:600px;max-width:98vw;max-height:98vw;border-radius:20px}
.bottom-text{
  position:fixed;bottom:24px;left:0;right:0;text-align:center;
  color:rgba(255,255,255,.2);font-size:13px;letter-spacing:3px;z-index:5;
  font-weight:300;
}
</style>
</head>
<body>

<canvas id="c"></canvas>
<div class="bottom-text">💕 100 次想念，拼成一颗心</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize(){
  const s = Math.min(window.innerWidth * 0.95, window.innerHeight * 0.85, 600);
  canvas.width = s * window.devicePixelRatio;
  canvas.height = s * window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  canvas.style.width = s + 'px';
  canvas.style.height = s + 'px';
  return s;
}

const points = [(302.8, 252.1), (297.1, 251.5), (304.2, 248.5), (299.6, 239.1), (301.8, 227.4), (308.5, 222.6), (315.1, 212.1), (318.4, 195.0), (326.4, 189.5), (339.1, 173.2), (352.6, 163.0), (365.9, 154.9), (381.9, 148.4), (397.2, 143.5), (414.0, 141.1), (439.3, 135.7), (453.0, 142.4), (472.4, 150.6), (487.1, 157.7), (507.2, 169.4), (523.5, 181.5), (529.9, 196.4), (546.3, 208.3), (553.4, 232.3), (556.2, 249.8), (555.0, 269.4), (556.5, 282.8), (551.2, 306.0), (539.5, 320.4), (533.0, 340.9), (520.5, 358.7), (501.9, 375.1), (486.3, 393.3), (472.8, 413.5), (454.3, 429.6), (435.9, 447.0), (415.7, 464.6), (400.6, 472.9), (383.2, 490.6), (364.0, 504.9), (351.7, 523.0), (338.4, 531.3), (329.7, 542.5), (316.1, 559.8), (312.0, 569.4), (305.7, 578.6), (307.0, 586.0), (300.5, 592.8), (300.9, 595.2), (296.6, 600.3), (300.0, 600.1), (297.9, 601.0), (303.3, 594.6), (299.3, 596.5), (299.4, 583.9), (289.2, 582.3), (291.0, 569.6), (276.6, 559.0), (272.0, 544.0), (258.4, 537.0), (246.5, 520.6), (233.7, 506.3), (221.3, 488.6), (200.4, 474.5), (182.7, 461.8), (163.8, 443.3), (142.5, 428.4), (124.3, 414.6), (112.3, 399.1), (95.7, 375.0), (83.1, 358.7), (66.0, 343.1), (54.0, 324.2), (48.2, 304.4), (48.4, 285.3), (43.6, 265.5), (44.5, 250.7), (52.4, 227.3), (59.9, 207.9), (64.5, 193.6), (78.0, 180.4), (94.3, 166.8), (107.5, 156.4), (127.7, 151.0), (147.8, 145.9), (162.0, 140.6), (185.2, 135.8), (198.0, 139.6), (217.1, 144.6), (230.3, 155.3), (245.6, 160.4), (257.3, 171.6), (270.7, 186.3), (283.5, 197.7), (287.6, 206.5), (294.5, 220.8), (295.0, 233.8), (295.9, 241.2), (298.3, 247.5), (299.2, 246.3)];

const allColors = ['#ff4d6d', '#ff6b6b', '#ff8e8e', '#ffb3b3', '#c9184a', '#a4133c', '#ff4d6d', '#800f2f'];
let frame = 0;

function draw(){
  const s = resize();
  const ratio = s / 600;
  ctx.clearRect(0,0,s,s);

  // 绘制柔和连接线（爱心轮廓更清晰）
  ctx.beginPath();
  ctx.strokeStyle = 'rgba(255,77,109,0.06)';
  ctx.lineWidth = 1;
  for(let i=0; i<points.length; i++){
    for(let j=i+1; j<points.length; j++){
      const dx = points[i][0]*ratio - points[j][0]*ratio;
      const dy = points[i][1]*ratio - points[j][1]*ratio;
      if(dx*dx + dy*dy < 2500){
        ctx.moveTo(points[i][0]*ratio, points[i][1]*ratio);
        ctx.lineTo(points[j][0]*ratio, points[j][1]*ratio);
      }
    }
  }
  ctx.stroke();

  // 绘制 100 个「韩舒雨想你了」
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = '#ff4d6d';

  const glow = 0.5 + 0.5 * Math.sin(frame * 0.03);

  for(let i=0; i<points.length; i++){
    const x = points[i][0] * ratio;
    const y = points[i][1] * ratio;
    const color = allColors[i % allColors.length];

    // 每个文字大小微不同，更有层次
    const size = 9 + 3 * Math.sin(frame * 0.05 + i * 0.5) + 2;
    const fontSize = Math.max(8, Math.min(16, size * (s / 600)));

    ctx.shadowBlur = 12 * glow;
    ctx.shadowColor = color;
    ctx.font = `${fontSize}px "PingFang SC", "Microsoft YaHei", sans-serif`;
    ctx.fillStyle = color;
    ctx.fillText('韩舒雨想你了', x, y);

    // 再画一次微偏移的亮色叠加，制造发光感
    ctx.shadowBlur = 4;
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillText('韩舒雨想你了', x-0.5, y-0.5);
  }

  frame++;
  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
