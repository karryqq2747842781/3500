<title>💕 韩舒雨想你了</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background: linear-gradient(145deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  overflow: hidden;
}
.container{position:relative;width:500px;height:500px;max-width:95vw;max-height:95vw}
canvas{position:absolute;inset:0;width:100%;height:100%}
.falling-hearts{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.falling-hearts span{
  position:absolute;top:-10%;font-size:20px;animation:fall linear infinite;
  opacity:.15;
}
@keyframes fall{
  0%{transform:translateY(-10vh) rotate(0deg);opacity:0}
  10%{opacity:.15}
  90%{opacity:.15}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0}
}
.bottom-text{
  position:fixed;bottom:30px;left:0;right:0;text-align:center;
  color:rgba(255,255,255,.25);font-size:14px;letter-spacing:2px;z-index:5;
  font-weight:300;
}
</style>
</head>
<body>

<div class="container">
  <canvas id="heartCanvas"></canvas>
</div>

<div class="falling-hearts" id="fallingHearts"></div>
<div class="bottom-text">💕 100次想念，每一次都是你</div>

  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  return {w: rect.width, h: rect.height};
}

let alpha = 0;
const allColors = ['#ff4d6d', '#ff6b6b', '#ff8e8e', '#ffb3b3', '#ffc2d1', '#ff4d6d', '#c9184a', '#a4133c'];

function drawHeart(){
  const {w,h} = resize();
  ctx.clearRect(0,0,w,h);

  // 发光效果
  ctx.shadowColor = '#ff4d6d';
  ctx.shadowBlur = 20;

  // 绘制爱心连接线 (小点之间连线)
  ctx.beginPath();
  ctx.strokeStyle = 'rgba(255,77,109,0.08)';
  ctx.lineWidth = 1;
  for(let i=0; i<points.length; i++){
    for(let j=i+1; j<points.length; j++){
      const dx = points[i][0] - points[j][0];
      const dy = points[i][1] - points[j][1];
      if(dx*dx + dy*dy < 1200){
        ctx.moveTo(points[i][0], points[i][1]);
        ctx.lineTo(points[j][0], points[j][1]);
      }
    }
  }
  ctx.stroke();

  // 绘制每个字
  ctx.shadowBlur = 12;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const glow = 0.4 + 0.6 * Math.abs(Math.sin(alpha));

  for(let i=0; i<points.length; i++){
    const [x,y,idx] = points[i];
    const color = allColors[idx % allColors.length];

    // 光晕
    ctx.shadowColor = color;
    ctx.shadowBlur = 15 * glow;

    // 主文字
    const size = 11 + 2 * Math.sin(alpha + i * 0.3);
    ctx.font = `bold ${size}px "PingFang SC", "Microsoft YaHei", sans-serif`;
    ctx.fillStyle = color;
    ctx.fillText('❤', x, y-1);

    // 小字标签
    ctx.font = `${size * 0.7}px "PingFang SC", "Microsoft YaHei", sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.shadowBlur = 8;
    ctx.fillText('韩舒雨想你了', x, y + 2);
  }

  alpha += 0.02;
  requestAnimationFrame(drawHeart);
}

drawHeart();

// ── 背景飘落爱心 ──
(function(){
  const container = document.getElementById('fallingHearts');
  const emojis = ['💕','💗','❤','💖','💘','💝'];
  for(let i=0; i<18; i++){
    const span = document.createElement('span');
    span.textContent = emojis[i % emojis.length];
    span.style.left = Math.random() * 100 + '%';
    span.style.fontSize = (12 + Math.random() * 18) + 'px';
    span.style.animationDuration = (8 + Math.random() * 12) + 's';
    span.style.animationDelay = (Math.random() * 15) + 's';
    container.appendChild(span);
  }
})();
